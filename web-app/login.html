<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk · Argos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sora:wght@400;600;700&display=swap"
          rel="stylesheet">
</head>
<body class="login-body">

    <!-- Decorative background glows -->
    <div class="login-bg-glow login-bg-glow--top"></div>
    <div class="login-bg-glow login-bg-glow--bottom"></div>

    <main class="login-shell">
        <div class="login-card">

            <div class="login-brand">
                <div class="login-brand-icon">
                    <svg fill="none" height="22" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" width="22">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </div>
                <h1 class="login-brand-name">Argos</h1>
                <p class="login-brand-tagline">Competitive Intelligence Platform</p>
            </div>

            <div class="login-divider"></div>

            <div class="login-actions">
                <a href="/api/v1/auth/google/login" class="btn-google-login">
                    <span class="btn-google-icon" aria-hidden="true">
                        <!-- Full-color Google G logo -->
                        <svg width="18" height="18" viewBox="0 0 18 18">
                            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
                            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
                            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
                            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                        </svg>
                    </span>
                    <span class="btn-google-text">Lanjut dengan Google</span>
                </a>
            </div>

            <p class="login-footer">
                Dengan masuk, Anda menyetujui Ketentuan Layanan dan Kebijakan Privasi.
            </p>
        </div>
    </main>

</body>
</html>
