<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Argos — Competitive Intelligence</title>
    <link href="/css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sora:wght@400;600;700&display=swap"
          rel="stylesheet">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app-wrapper">

    <aside class="sidebar" id="sidebar">

        <!-- Brand Header -->
        <div class="sidebar-header">
            <div class="brand-container">
                <div class="brand-icon">
                    <svg fill="none" height="18" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"
                         width="18">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </div>
                <span class="brand-text">Argos</span>
            </div>
            <button class="btn-close-sidebar" onclick="toggleSidebar()" title="Tutup menu">
                <svg fill="none" height="16" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </button>
        </div>

        <!-- New Chat Button -->
        <div class="new-chat-section">
            <button class="btn-new-chat" id="newChatBtn" title="Mulai percakapan baru">
                <svg fill="none" height="14" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" width="14">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New chat
            </button>
        </div>

        <!-- Threads (multi-conversation) -->
        <div class="history-section">
            <div class="history-section-header">
                <span class="history-title">Conversations</span>
                <span class="history-count" id="historyCount">0</span>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty" id="historyEmpty">Belum ada percakapan.</div>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="upload-section">
            <p class="upload-title">Dokumen</p>
            <div class="upload-card">
                <div class="upload-icon-wrap">
                    <svg fill="none" height="22" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"
                         width="22">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" x2="12" y1="3" y2="15"/>
                    </svg>
                </div>
                <p class="upload-desc">Unggah PDF atau Markdown</p>
                <input accept=".pdf,.md" id="fileInput" multiple style="display:none;" type="file">
                <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">
                    Pilih File
                </button>
                <div class="file-list-text" id="file-list"></div>
                <button class="btn btn-primary" id="uploadBtn" style="display:none;">
                    Ekstrak ke DB
                </button>
                <div id="upload-status"></div>
            </div>
        </div>

        <!-- Sidebar Footer — user profile pill (Perplexity-style) -->
        <div class="sidebar-footer">
            <button type="button" class="user-pill" id="userPillBtn" aria-haspopup="menu" aria-expanded="false">
                <div class="user-pill-avatar" id="userAvatar">
                    <span class="user-pill-avatar-fallback" id="userAvatarFallback">U</span>
                </div>
                <span class="user-pill-name" id="userName">Loading...</span>
                <svg class="user-pill-chevron" fill="none" height="14" stroke="currentColor" stroke-width="2"
                     viewBox="0 0 24 24" width="14">
                    <circle cx="12" cy="5"  r="1.4"/>
                    <circle cx="12" cy="12" r="1.4"/>
                    <circle cx="12" cy="19" r="1.4"/>
                </svg>
            </button>

            <!-- Dropdown menu (toggled by JS) -->
            <div class="user-menu" id="userMenu" role="menu" hidden>
                <div class="user-menu-header">
                    <div class="user-menu-name"  id="userMenuName">User</div>
                    <div class="user-menu-email" id="userMenuEmail"></div>
                </div>
                <div class="user-menu-divider"></div>
                <button type="button" class="user-menu-item user-menu-item--danger" id="logoutBtn" role="menuitem">
                    <svg fill="none" height="15" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="15">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" x2="9" y1="12" y2="12"/>
                    </svg>
                    Log out
                </button>
            </div>
        </div>

    </aside>

    <main class="chat-main">

        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <button class="btn-menu-toggle" onclick="toggleSidebar()" title="Buka menu">
                    <svg fill="none" height="18" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18">
                        <line x1="3" x2="21" y1="6" y2="6"/>
                        <line x1="3" x2="21" y1="12" y2="12"/>
                        <line x1="3" x2="21" y1="18" y2="18"/>
                    </svg>
                </button>
                <span class="header-title" id="chatHeaderTitle">AI Chat Helper</span>
            </div>
            <div class="header-actions">
                <div class="header-search">
                    <svg fill="none" height="14" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input class="header-search-input" placeholder="Search" type="text">
                </div>
                <button class="header-icon-btn" id="renameThreadBtn" title="Ganti nama" style="display:none;">
                    <svg fill="none" height="16" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16">
                        <path d="M12 20h9"/>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/>
                    </svg>
                </button>
                <button class="header-icon-btn" id="deleteThreadBtn" title="Hapus percakapan" style="display:none;">
                    <svg fill="none" height="16" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Welcome screen (shown when no conversation is loaded) -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-icon">
                <svg fill="none" height="32" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" width="32">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
            </div>
            <h1 class="welcome-title">Selamat datang di Argos</h1>
            <p class="welcome-subtitle">
                Tanyakan apa saja seputar harga, fitur, atau metrik kompetitor Anda.
            </p>
            <div class="welcome-suggestions">
                <button class="welcome-suggestion" data-prompt="Bandingkan harga semua kompetitor di database.">
                    Bandingkan harga kompetitor
                </button>
                <button class="welcome-suggestion" data-prompt="Apa kelemahan utama kompetitor terbesar kami?">
                    Cari kelemahan kompetitor
                </button>
                <button class="welcome-suggestion" data-prompt="Ringkas fitur unggulan dari semua produk.">
                    Ringkas fitur unggulan
                </button>
            </div>
        </div>

        <!-- Chat messages -->
        <div class="chat-box" id="chatBox" style="display:none;"></div>

        <!-- Typing indicator -->
        <div class="loading-container" id="chatLoading">
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Input area -->
        <div class="input-container">
            <div class="input-wrapper">
                <button class="btn-icon btn-attach" title="Lampirkan file">
                    <svg fill="none" height="15" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="15">
                        <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <input autocomplete="off" id="chatInput" placeholder="Tulis pesan..." type="text">
                <button class="btn-icon btn-mic" id="micBtn" title="Rekam suara">
                    <svg fill="none" height="15" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="15">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" x2="12" y1="19" y2="23"/>
                        <line x1="8" x2="16" y1="23" y2="23"/>
                    </svg>
                </button>
                <button class="btn-icon btn-send" id="sendBtn" title="Kirim">
                    <svg fill="none" height="15" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="15">
                        <line x1="22" x2="11" y1="2" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <p class="input-disclaimer">Argos dapat membuat kesalahan. Periksa informasi penting.</p>
        </div>

    </main>

</div>

<div class="modal-overlay" id="appModal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
            <div class="modal-icon" id="modalIcon">
                <!-- icon injected by JS -->
            </div>
            <h2 class="modal-title" id="modalTitle">Title</h2>
            <p class="modal-subtitle" id="modalSubtitle"></p>
        </div>

        <div class="modal-divider"></div>

        <div class="modal-body" id="modalBody">
            <!-- input field (only shown for prompt-type) -->
            <input class="modal-input" id="modalInput" type="text" autocomplete="off" hidden>
        </div>

        <div class="modal-actions">
            <button type="button" class="modal-btn modal-btn--ghost" id="modalCancelBtn">Batal</button>
            <button type="button" class="modal-btn modal-btn--primary" id="modalConfirmBtn">OK</button>
        </div>
    </div>
</div>

<script>
    // Decode JWT payload (no verification — display only)
    function parseJwt(token) {
        try {
            return JSON.parse(atob(token.split(".")[1]));
        } catch {
            return null;
        }
    }

    function getInitial(name, email) {
        const src = (name || email || "U").trim();
        return src ? src.charAt(0).toUpperCase() : "U";
    }

    (function renderUserProfile() {
        const token   = localStorage.getItem("access_token");
        const payload = token ? parseJwt(token) : null;

        const pillNameEl  = document.getElementById("userName");
        const avatarEl    = document.getElementById("userAvatar");
        const fallbackEl  = document.getElementById("userAvatarFallback");
        const menuNameEl  = document.getElementById("userMenuName");
        const menuEmailEl = document.getElementById("userMenuEmail");

        const fullName  = (payload && payload.name)       || "";
        const firstName = (payload && payload.given_name) || fullName.split(" ")[0] || "User";
        const email     = (payload && payload.email)      || "";
        const picture   = (payload && payload.picture)    || "";

        // Pill: nama depan saja
        pillNameEl.textContent = firstName;

        // Dropdown header: nama lengkap + email
        menuNameEl.textContent  = fullName || firstName;
        menuEmailEl.textContent = email;

        // Avatar: gambar Google atau fallback inisial
        fallbackEl.textContent = getInitial(fullName, email);
        if (picture) {
            const img = document.createElement("img");
            img.src = picture;
            img.alt = fullName || "Profile";
            img.referrerPolicy = "no-referrer";  // Google CDN tolak request dengan referrer
            img.onerror = () => { img.remove(); };
            avatarEl.insertBefore(img, fallbackEl);
        }
    })();

    // Dropdown toggle
    (function setupUserMenu() {
        const pillBtn = document.getElementById("userPillBtn");
        const menu    = document.getElementById("userMenu");
        if (!pillBtn || !menu) return;

        function open()  { menu.hidden = false; pillBtn.setAttribute("aria-expanded", "true");  pillBtn.classList.add("is-open"); }
        function close() { menu.hidden = true;  pillBtn.setAttribute("aria-expanded", "false"); pillBtn.classList.remove("is-open"); }
        function toggle(){ menu.hidden ? open() : close(); }

        pillBtn.addEventListener("click", (e) => { e.stopPropagation(); toggle(); });

        // Click di luar menu → close
        document.addEventListener("click", (e) => {
            if (menu.hidden) return;
            if (!menu.contains(e.target) && !pillBtn.contains(e.target)) close();
        });

        // Esc → close
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && !menu.hidden) close();
        });
    })();

    document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("access_token");
        window.location.href = "/login";
    });
</script>

<script src="/js/main.js"></script>
</body>
</html>
